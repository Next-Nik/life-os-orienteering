<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life OS: The Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Cormorant+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div class="container">

    <header class="header">
      <img src="/logo.png" alt="Life OS" class="logo" />
      <h1><span class="header-prefix">Life OS: </span>The Map</h1>
      <p class="header-sub">An honest picture of where you are.</p>
    </header>

    <div class="progress-container" id="progress-container" style="display:none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label">Beginning</div>
    </div>

    <!-- Welcome screen — single entry, no carousel -->
    <div id="welcome-screen">
      <div class="entry-card">
        <p class="entry-body">Seven domains. One honest picture of where you are right now.</p>
        <button class="carousel-begin" id="begin-btn">Begin your map</button>
      </div>
    </div>

    <!-- Chat area -->
    <div id="chat-area" style="display:none; flex-direction:column; flex:1;">
      <div id="wheel-container" class="wheel-container" style="display:none;">
        <canvas id="domain-wheel" width="280" height="280"></canvas>
        <div id="wheel-legend" class="wheel-legend"></div>
      </div>
      <div id="chat-container"></div>
    </div>

  </div>

  <div class="input-area" id="input-area" style="display:none;">
    <div class="input-inner">
      <textarea
        id="user-input"
        placeholder="Type your answer..."
        rows="1"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button class="btn-send" id="send-btn">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.SUPABASE_URL      = "https://tphbpwzozkskytoichho.supabase.co";
    window.SUPABASE_ANON_KEY = "sb_publishable_M00GF1FWV5tgKHqmyRCZag_kJjgBJn-";
  </script>
  <script src="/auth-guard.js"></script>
  <script src="/ui.js"></script>
  <script src="/app.js"></script>

</body>
</html>
